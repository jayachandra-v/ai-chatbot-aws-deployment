name: Deploy Application Docker Image to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Latest Image from ECR
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest

      - name: Stop Old Container
        run: |
          docker stop chatbot || true
          docker rm chatbot || true

      - name: Run New Container
        run: |
          docker run -d \
            -p 8000:8000 \
            --name chatbot \
            --restart always \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest